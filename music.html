<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Transit Framework</title>
		<script src="transit.js"></script>
		<script src="plugins/music/player.js"></script>
		<link rel="stylesheet" href="plugins/music/style.css" />
		<script type="text/javascript">
		
			var Transit = new TransitRoute( '#container' ).ready(function( e, n ){
			
				var transit = this.transit( e );
					
				transit.Player( );
			
			});
		</script>
	</head>
	<body>
		<div class="container" id="container">
		  <img src="plugins/music/img/library.png" class="icon" id="menu-icon" />

		  <nav>
			<img src="plugins/music/img/cancel.png" class="icon" id="cancel-icon">
			<h3>Music Player</h3>
			<div class="all-songs" id="all-songs-container">
			  <div class="menu-item">
			  <img src="plugins/music/img/all-songs.webp" class="icon">
			  <span>All Songs</span>
			</div>
			</div>
			<ul id="all-songs"></ul>
			<div id="add-song-btn">
			  <div class="menu-item">
			  <img src="plugins/music/img/add.png" class="icon add-icon" id="add-icon" />
			  <span>Add New Song</span>
			</div>
			  
			</div>
			<div class="new-song-container" id="new-song-container">
			  <form>
			  <input type="file" id="file-picker" accept="audio/*" multiple/>
			</form>
			</div>
		  </nav>

		  <div class="music-card">
			<div id="album-img"></div>
		
			<div class="icons">
			  <div class="track-slider">
				<input
				  type="range"
				  value="0"
				  min="1"
				  max="100"
				  id="track-slider"
				  class="track-slider"
				/>
			  </div>
			  <div>
				<img src="plugins/music/img/mix.png" class="icon" id="mix" />
				<img src="plugins/music/img/prev-song.png" class="icon" id="left" />
				<span src="plugins/music/img/play2.webp" class="icon" id="play">►</span>
				<img src="plugins/music/img/next-song.png" class="icon" id="right" />
				<img src="plugins/music/img/repeat.png" class="icon" id="repeat" />
			  </div>

			  <div class="volume">
				<img src="plugins/music/img/volume.png" class="icon" id="volume" />
				<input
				  type="range"
				  min="1"
				  max="100"
				  value="60"
				  id="volume-slider"
				/>
			  </div>
			</div>
			<footer>
			  <span class="title">Now Playing</span>
			  <h2 id="current-song-name">Hydelic - Yours Forever</h2>
			  <span id="change-warning"></span>
			</footer>
			<audio id="music" src="plugins/music/music/connected.m4a"></audio>
		  </div>
		</div>
	</body>
</html>
