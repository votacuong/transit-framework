<!DOCTYPE html>
<html lang="en">

        <title>Transit Framework</title>
		<script src="transit.js"></script>
		<script src="plugins/map.js"></script>
		<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAF2IdXguZL7cq2-AEUOktlxF8NUY2GrBM&callback=initMap&v=weekly" defer></script>
		<link rel="stylesheet" href="plugins/music/style.css" />
		<style>
		html,
		body {
		  height: 100%;
		  margin: 0;
		  padding: 0;
		}

		#map {
		  height: 100%;
		}
		</style>
		<script type="text/javascript">
		
			var Transit = new TransitRoute( '#map' ).ready(function( e, n ){
				
				TransitRoute.Request().get( 'server.php', function( data ){
				
					console.log( data );
					
				}).success(function( data ){
				
					console.log( data );
				
				});
			
			});
			
			function initMap()
			{
				
				var Transit = new TransitRoute( '#map' ).ready(function( e, n ){
			
					var transit = this.transit( e );
					
					transit.map( ).initMap( );
				
				});
				
			}
		</script>

	<body>
		<div id="map">Hello World</div>
	</body>
